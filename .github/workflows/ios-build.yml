name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Capacitor Sync
      run: |
        npx cap sync ios || (npx cap add ios && npx cap sync ios)

    - name: Build iOS App
      run: |
        xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphoneos -configuration Release -derivedDataPath build
        
        # Create IPA structure for Sideloadly
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/App.app Payload/
        zip -r App.ipa Payload
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: B737-WB-iOS
        path: App.ipa
